<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CodeChum ID Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header><h1>CodeChum ID Generator</h1></header>
    <div class="container">
        <section id="form-section">
            <h2>Create Your ID</h2>
            <form id="idForm">
                <label>Full Name:</label>
                <input type="text" id="fullName" required>
                <label>Nickname:</label>
                <input type="text" id="nickname" required>
                <label>Date of Birth:</label>
                <input type="date" id="dob" required>
                <label>Address:</label>
                <input type="text" id="address" required>
                <label>Email:</label>
                <input type="email" id="email" required>
                <button type="submit">Sign Up</button>
            </form>
        </section>
        
        <section id="id-preview">
            <div class="id-card">
                <div class="card-header">CodeChum University</div>
                <div class="card-body">
                    <p>Name: <span id="outName">N/A</span></p>
                    <p>Nickname: <span id="outNick">N/A</span></p>
                    <p>Date of Birth: <span id="outDob">N/A</span></p>
                    <p>Address: <span id="outAddr">N/A</span></p>
                    <p>Email: <span id="outEmail">N/A</span></p>
                </div>
            </div>
        </section>
    </div>
    <script src="javascript.js"></script>
</body>
</html>
